services:
  keycloak:
    image: quay.io/keycloak/keycloak
    command: start-dev
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - keycloak_data:/opt/keycloak/data

volumes:
  keycloak_data:
